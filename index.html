<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BURGER HOUSE | Premium Fast Food</title>
    
    <!-- Font Awesome 6 -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- Google Fonts - Modern Combo -->
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;800&family=Montserrat:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <style>
        /* ===== RESET & VARIABLES ===== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary: #c49b63;
            --primary-dark: #a17d4a;
            --secondary: #2c2c2c;
            --dark: #1a1a1a;
            --light: #faf9f7;
            --gray: #e8e5e0;
            --text: #333333;
            --text-light: #666666;
            --white: #ffffff;
            --shadow: 0 10px 30px rgba(0,0,0,0.05);
            --shadow-hover: 0 20px 40px rgba(0,0,0,0.1);
        }

        body {
            font-family: 'Montserrat', sans-serif;
            background: var(--light);
            color: var(--text);
            overflow-x: hidden;
        }

        h1, h2, h3, h4 {
            font-family: 'Playfair Display', serif;
            font-weight: 800;
        }

        /* ===== NAVBAR ===== */
        .navbar {
            background: var(--white);
            box-shadow: var(--shadow);
            position: sticky;
            top: 0;
            z-index: 1000;
            backdrop-filter: blur(10px);
            background: rgba(255, 255, 255, 0.95);
        }

        .nav-container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 15px 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .logo i {
            font-size: 36px;
            color: var(--primary);
        }

        .logo h2 {
            font-size: 26px;
            font-weight: 800;
            letter-spacing: -0.5px;
        }

        .logo span {
            color: var(--primary);
            font-style: italic;
        }

        .nav-links {
            display: flex;
            gap: 40px;
        }

        .nav-links a {
            text-decoration: none;
            color: var(--text);
            font-weight: 600;
            font-size: 15px;
            text-transform: uppercase;
            letter-spacing: 1px;
            cursor: pointer;
            transition: color 0.3s;
            position: relative;
        }

        .nav-links a::after {
            content: '';
            position: absolute;
            bottom: -5px;
            left: 0;
            width: 0;
            height: 2px;
            background: var(--primary);
            transition: width 0.3s;
        }

        .nav-links a:hover {
            color: var(--primary);
        }

        .nav-links a:hover::after {
            width: 100%;
        }

        .right-section {
            display: flex;
            align-items: center;
            gap: 25px;
        }

        /* ===== CART ICON ===== */
        .cart-icon {
            position: relative;
            background: none;
            border: none;
            font-size: 24px;
            cursor: pointer;
            color: var(--text);
            transition: color 0.3s;
        }

        .cart-icon:hover {
            color: var(--primary);
        }

        .cart-count {
            position: absolute;
            top: -8px;
            right: -8px;
            background: var(--primary);
            color: white;
            font-size: 11px;
            font-weight: 600;
            padding: 3px 6px;
            border-radius: 50%;
            min-width: 18px;
        }

        .user-info {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .user-info button {
            background: var(--primary);
            color: white;
            border: none;
            padding: 10px 22px;
            border-radius: 40px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 8px;
            transition: all 0.3s;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .user-info button:hover {
            background: var(--primary-dark);
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(196, 155, 99, 0.3);
        }

        /* ===== HERO SECTION ===== */
        .hero {
            max-width: 1400px;
            margin: 50px auto;
            padding: 0 30px;
            display: grid;
            grid-template-columns: 1fr 1fr;
            align-items: center;
            gap: 60px;
            background: var(--white);
            border-radius: 40px;
            box-shadow: var(--shadow);
            overflow: hidden;
        }

        .hero-content {
            padding: 60px 40px;
        }

        .hero-content h1 {
            font-size: 64px;
            font-weight: 800;
            line-height: 1.1;
            margin-bottom: 20px;
            color: var(--dark);
        }

        .hero-content .highlight {
            color: var(--primary);
            position: relative;
            display: inline-block;
        }

        .hero-content .highlight::after {
            content: '';
            position: absolute;
            bottom: 5px;
            left: 0;
            width: 100%;
            height: 8px;
            background: rgba(196, 155, 99, 0.2);
            z-index: -1;
        }

        .hero-content p {
            font-size: 18px;
            color: var(--text-light);
            margin-bottom: 30px;
            line-height: 1.8;
        }

        .hero-content p i {
            color: var(--primary);
            margin-right: 10px;
            width: 24px;
        }

        .btn-primary {
            background: var(--primary);
            color: white;
            border: none;
            padding: 18px 45px;
            border-radius: 50px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            gap: 12px;
            transition: all 0.3s;
            text-transform: uppercase;
            letter-spacing: 1px;
            box-shadow: 0 10px 20px rgba(196, 155, 99, 0.3);
        }

        .btn-primary:hover {
            background: var(--primary-dark);
            transform: translateY(-2px);
            box-shadow: 0 15px 30px rgba(196, 155, 99, 0.4);
        }

        .hero-image {
            height: 600px;
            position: relative;
        }

        .hero-image img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        /* ===== PRODUCTS SECTION ===== */
        .products {
            max-width: 1400px;
            margin: 80px auto;
            padding: 0 30px;
        }

        .section-header {
            text-align: center;
            margin-bottom: 50px;
        }

        .section-header h2 {
            font-size: 42px;
            font-weight: 800;
            color: var(--dark);
            margin-bottom: 15px;
        }

        .section-header h2 span {
            color: var(--primary);
        }

        .section-header p {
            color: var(--text-light);
            font-size: 16px;
            text-transform: uppercase;
            letter-spacing: 3px;
        }

        .products-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 30px;
        }

        .product-card {
            background: var(--white);
            border-radius: 30px;
            overflow: hidden;
            box-shadow: var(--shadow);
            transition: all 0.3s;
            cursor: pointer;
        }

        .product-card:hover {
            transform: translateY(-10px);
            box-shadow: var(--shadow-hover);
        }

        .product-image {
            height: 240px;
            overflow: hidden;
            position: relative;
        }

        .product-image::after {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: linear-gradient(to bottom, transparent 50%, rgba(0,0,0,0.1));
        }

        .product-image img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.5s;
        }

        .product-card:hover .product-image img {
            transform: scale(1.1);
        }

        .product-info {
            padding: 25px;
            position: relative;
        }

        .product-info h3 {
            font-size: 22px;
            margin-bottom: 10px;
            color: var(--dark);
        }

        .product-price {
            font-size: 28px;
            font-weight: 800;
            color: var(--primary);
            margin-bottom: 20px;
            font-family: 'Playfair Display', serif;
        }

        .btn-add-to-cart {
            width: 100%;
            background: var(--gray);
            border: none;
            padding: 14px;
            border-radius: 15px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            transition: all 0.3s;
            color: var(--text);
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .btn-add-to-cart:hover {
            background: var(--primary);
            color: white;
        }

        /* ===== CART SIDEBAR - PROFESSIONAL ===== */
        .cart-sidebar {
            position: fixed;
            top: 0;
            right: -500px;
            width: 450px;
            height: 100vh;
            background: var(--white);
            box-shadow: -10px 0 40px rgba(0,0,0,0.1);
            z-index: 2000;
            transition: right 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            display: flex;
            flex-direction: column;
        }

        .cart-sidebar.active {
            right: 0;
        }

        .cart-header {
            padding: 30px;
            border-bottom: 2px solid var(--gray);
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: var(--white);
        }

        .cart-header h3 {
            font-size: 24px;
            font-weight: 800;
            color: var(--dark);
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .cart-header h3 i {
            color: var(--primary);
            font-size: 28px;
        }

        .close-cart {
            background: var(--gray);
            border: none;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            font-size: 20px;
            cursor: pointer;
            color: var(--text);
            transition: all 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .close-cart:hover {
            background: var(--primary);
            color: white;
            transform: rotate(90deg);
        }

        .cart-items {
            flex: 1;
            overflow-y: auto;
            padding: 30px;
            background: var(--light);
        }

        .cart-item {
            display: flex;
            gap: 20px;
            margin-bottom: 25px;
            padding: 20px;
            background: white;
            border-radius: 20px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.05);
            transition: all 0.3s;
        }

        .cart-item:hover {
            transform: translateX(-5px);
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
        }

        .cart-item img {
            width: 90px;
            height: 90px;
            border-radius: 15px;
            object-fit: cover;
        }

        .cart-item-details {
            flex: 1;
        }

        .cart-item-details h4 {
            font-size: 18px;
            font-weight: 700;
            margin-bottom: 8px;
            color: var(--dark);
        }

        .cart-item-price {
            color: var(--primary);
            font-weight: 700;
            font-size: 18px;
            margin-bottom: 12px;
        }

        .cart-item-actions {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .cart-item-actions button {
            background: var(--gray);
            border: none;
            width: 32px;
            height: 32px;
            border-radius: 10px;
            cursor: pointer;
            font-weight: 700;
            font-size: 16px;
            transition: all 0.3s;
            color: var(--text);
        }

        .cart-item-actions button:hover {
            background: var(--primary);
            color: white;
        }

        .cart-item-actions span {
            font-weight: 700;
            font-size: 16px;
            min-width: 25px;
            text-align: center;
        }

        .remove-btn {
            background: none !important;
            color: #ef4444 !important;
            width: auto !important;
            padding: 0 10px !important;
        }

        .remove-btn:hover {
            background: #fee2e2 !important;
            color: #ef4444 !important;
        }

        .cart-footer {
            padding: 30px;
            border-top: 2px solid var(--gray);
            background: white;
        }

        .cart-total {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            font-size: 20px;
            font-weight: 600;
        }

        .cart-total span:last-child {
            color: var(--primary);
            font-size: 28px;
            font-weight: 800;
            font-family: 'Playfair Display', serif;
        }

        .btn-checkout {
            width: 100%;
            background: var(--primary);
            color: white;
            border: none;
            padding: 18px;
            border-radius: 15px;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            transition: all 0.3s;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .btn-checkout:hover {
            background: var(--primary-dark);
            transform: translateY(-2px);
            box-shadow: 0 10px 25px rgba(196, 155, 99, 0.4);
        }

        .btn-checkout:disabled {
            background: var(--gray);
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }

        /* ===== OVERLAY ===== */
        .overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            backdrop-filter: blur(5px);
            display: none;
            z-index: 1999;
        }

        .overlay.active {
            display: block;
        }

        /* ===== EMPTY CART ===== */
        .empty-cart {
            text-align: center;
            padding: 60px 20px;
        }

        .empty-cart i {
            font-size: 100px;
            color: var(--gray);
            margin-bottom: 25px;
        }

        .empty-cart p {
            color: var(--text-light);
            font-size: 18px;
        }

        /* ===== TOAST ===== */
        .toast {
            position: fixed;
            bottom: 40px;
            left: 50%;
            transform: translateX(-50%) translateY(100px);
            background: var(--dark);
            color: white;
            padding: 16px 35px;
            border-radius: 60px;
            font-size: 15px;
            font-weight: 500;
            z-index: 3000;
            transition: transform 0.3s;
            opacity: 0;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .toast.show {
            transform: translateX(-50%) translateY(0);
            opacity: 1;
        }

        .toast i {
            color: var(--primary);
            font-size: 20px;
        }

        /* ===== RESPONSIVE ===== */
        @media (max-width: 1024px) {
            .hero-content h1 {
                font-size: 48px;
            }
        }

        @media (max-width: 768px) {
            .nav-links {
                display: none;
            }
            
            .hero {
                grid-template-columns: 1fr;
            }
            
            .hero-content h1 {
                font-size: 40px;
            }
            
            .hero-image {
                height: 400px;
            }
            
            .cart-sidebar {
                width: 100%;
            }
            
            .products-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <!-- Navbar -->
    <nav class="navbar">
        <div class="nav-container">
            <div class="logo">
                <i class="fas fa-utensils"></i>
                <h2>BURGER<span>HOUSE</span></h2>
            </div>
            
            <div class="nav-links">
                <a onclick="scrollToSection('home')">Home</a>
                <a onclick="scrollToSection('products')">Menu</a>
                <a onclick="scrollToSection('about')">About</a>
                <a onclick="scrollToSection('contact')">Contact</a>
            </div>
            
            <div class="right-section">
                <button class="cart-icon" onclick="toggleCart()">
                    <i class="fas fa-shopping-bag"></i>
                    <span class="cart-count" id="cartCount">0</span>
                </button>
                
                <div class="user-info" id="userInfo">
                    <button onclick="googleLogin()">
                        <i class="fab fa-google"></i> Login
                    </button>
                </div>
            </div>
        </div>
    </nav>

    <!-- Hero Section -->
    <section class="hero" id="home">
        <div class="hero-content">
            <h1>Where Every <span class="highlight">Bite</span> Tells a Story</h1>
            <p>
                <span><i class="fas fa-check-circle"></i> Premium ingredients</span><br>
                <span><i class="fas fa-check-circle"></i> Secret family recipes</span><br>
                <span><i class="fas fa-check-circle"></i> 30-min delivery</span>
            </p>
            <button class="btn-primary" onclick="scrollToSection('products')">
                Explore Menu <i class="fas fa-arrow-right"></i>
            </button>
        </div>
        <div class="hero-image">
            <img src="https://images.unsplash.com/photo-1571091718767-18b5b1457add?w=800" alt="Burger">
        </div>
    </section>

    <!-- Products Section -->
    <section class="products" id="products">
        <div class="section-header">
            <h2>Signature <span>Collection</span></h2>
            <p>Crafted to perfection</p>
        </div>
        
        <div class="products-grid" id="productsGrid">
            <!-- Products will load here -->
        </div>
    </section>

    <!-- Cart Sidebar -->
    <div class="cart-sidebar" id="cartSidebar">
        <div class="cart-header">
            <h3><i class="fas fa-shopping-bag"></i> Your Cart</h3>
            <button class="close-cart" onclick="toggleCart()"><i class="fas fa-times"></i></button>
        </div>
        
        <div class="cart-items" id="cartItems">
            <!-- Cart items will appear here -->
        </div>
        
        <div class="cart-footer">
            <div class="cart-total">
                <span>Total</span>
                <span id="cartTotal">$0.00</span>
            </div>
            <button class="btn-checkout" onclick="checkout()" id="checkoutBtn">
                Checkout <i class="fas fa-arrow-right"></i>
            </button>
        </div>
    </div>

    <!-- Overlay -->
    <div class="overlay" id="overlay" onclick="toggleCart()"></div>

    <!-- Toast -->
    <div class="toast" id="toast">
        <i class="fas fa-check-circle"></i>
        <span id="toastMessage"></span>
    </div>

    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-firestore-compat.js"></script>

    <script>
        // ============================================
        // FIREBASE CONFIG
        // ============================================
        const firebaseConfig = {
            apiKey: "AIzaSyDvpwrivywDoS4KrEKDjJfHvrVLTDHMHJQ",
            authDomain: "ukstore-147e3.firebaseapp.com",
            projectId: "ukstore-147e3",
            storageBucket: "ukstore-147e3.firebasestorage.app",
            messagingSenderId: "682218466479",
            appId: "1:682218466479:web:2cf15486de7a18efb0b85a"
        };

        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();

        // ============================================
        // GLOBAL VARIABLES
        // ============================================
        let currentUser = null;
        let cart = [];

        // ============================================
        // INITIALIZE
        // ============================================
        document.addEventListener('DOMContentLoaded', () => {
            console.log('✅ BURGER HOUSE loaded');
            loadProducts();
            loadCart();
            displayCart();
            setupAuth();
        });

        // ============================================
        // PRODUCTS
        // ============================================
        function loadProducts() {
            const products = [
                {
                    name: 'The Classic',
                    price: 12.99,
                    image: 'https://images.unsplash.com/photo-1568901346375-23c9450c58cd?w=600'
                },
                {
                    name: 'Double Trouble',
                    price: 16.99,
                    image: 'https://images.unsplash.com/photo-1553979459-d2229ba7431a?w=600'
                },
                {
                    name: 'Truffle Melt',
                    price: 19.99,
                    image: 'https://images.unsplash.com/photo-1572802419224-296b0aeee0d9?w=600'
                },
                {
                    name: 'Crispy Chicken',
                    price: 14.99,
                    image: 'https://images.unsplash.com/photo-1626645738196-c2a7c87a8f58?w=600'
                },
                {
                    name: 'Veggie Delight',
                    price: 11.99,
                    image: 'https://images.unsplash.com/photo-1525059696034-4967a8e1dca2?w=600'
                },
                {
                    name: 'BBQ Bacon',
                    price: 17.99,
                    image: 'https://images.unsplash.com/photo-1594212699903-ec8a3eca50f5?w=600'
                }
            ];

            const grid = document.getElementById('productsGrid');
            if (!grid) return;

            grid.innerHTML = '';

            products.forEach(product => {
                const card = document.createElement('div');
                card.className = 'product-card';
                card.innerHTML = `
                    <div class="product-image">
                        <img src="${product.image}" alt="${product.name}" loading="lazy">
                    </div>
                    <div class="product-info">
                        <h3>${product.name}</h3>
                        <div class="product-price">$${product.price}</div>
                        <button class="btn-add-to-cart" onclick="addToCart('${product.name}', ${product.price}, '${product.image}')">
                            <i class="fas fa-plus"></i> Add to Cart
                        </button>
                    </div>
                `;
                grid.appendChild(card);
            });
        }

        // ============================================
        // CART FUNCTIONS
        // ============================================
        function addToCart(name, price, image) {
            const existing = cart.find(item => item.name === name);
            
            if (existing) {
                existing.quantity++;
            } else {
                cart.push({ name, price, image, quantity: 1 });
            }
            
            saveCart();
            displayCart();
            showToast('Added to cart', 'success');
        }

        function removeFromCart(name) {
            cart = cart.filter(item => item.name !== name);
            saveCart();
            displayCart();
            showToast('Item removed', 'info');
        }

        function updateQuantity(name, change) {
            const item = cart.find(i => i.name === name);
            if (item) {
                item.quantity += change;
                if (item.quantity <= 0) {
                    removeFromCart(name);
                } else {
                    saveCart();
                    displayCart();
                }
            }
        }

        function saveCart() {
            localStorage.setItem('burger_cart', JSON.stringify(cart));
            updateCartCount();
        }

        function loadCart() {
            const saved = localStorage.getItem('burger_cart');
            if (saved) {
                cart = JSON.parse(saved);
                updateCartCount();
            }
        }

        function updateCartCount() {
            const count = cart.reduce((total, item) => total + item.quantity, 0);
            const countElement = document.getElementById('cartCount');
            if (countElement) countElement.textContent = count;
        }

        function calculateTotal() {
            return cart.reduce((total, item) => total + (item.price * item.quantity), 0);
        }

        function displayCart() {
            const container = document.getElementById('cartItems');
            const totalElement = document.getElementById('cartTotal');
            const checkoutBtn = document.getElementById('checkoutBtn');
            
            if (!container || !totalElement) return;
            
            if (cart.length === 0) {
                container.innerHTML = `
                    <div class="empty-cart">
                        <i class="fas fa-shopping-bag"></i>
                        <p>Your cart is empty</p>
                    </div>
                `;
                totalElement.textContent = '$0.00';
                if (checkoutBtn) checkoutBtn.disabled = true;
                return;
            }
            
            if (checkoutBtn) checkoutBtn.disabled = false;
            
            let html = '';
            cart.forEach(item => {
                html += `
                    <div class="cart-item">
                        <img src="${item.image}" alt="${item.name}">
                        <div class="cart-item-details">
                            <h4>${item.name}</h4>
                            <div class="cart-item-price">$${(item.price * item.quantity).toFixed(2)}</div>
                            <div class="cart-item-actions">
                                <button onclick="updateQuantity('${item.name}', -1)">−</button>
                                <span>${item.quantity}</span>
                                <button onclick="updateQuantity('${item.name}', 1)">+</button>
                                <button class="remove-btn" onclick="removeFromCart('${item.name}')">
                                    <i class="fas fa-trash-alt"></i>
                                </button>
                            </div>
                        </div>
                    </div>
                `;
            });
            
            container.innerHTML = html;
            totalElement.textContent = `$${calculateTotal().toFixed(2)}`;
        }

        function toggleCart() {
            const sidebar = document.getElementById('cartSidebar');
            const overlay = document.getElementById('overlay');
            
            if (sidebar && overlay) {
                sidebar.classList.toggle('active');
                overlay.classList.toggle('active');
                displayCart();
            }
        }

        function checkout() {
            if (cart.length === 0) {
                showToast('Cart is empty', 'error');
                return;
            }
            
            if (!currentUser) {
                showToast('Please login first', 'warning');
                googleLogin();
                return;
            }
            
            showToast('Order placed! Thank you', 'success');
            cart = [];
            saveCart();
            displayCart();
            toggleCart();
        }

        // ============================================
        // AUTH FUNCTIONS
        // ============================================
        function setupAuth() {
            auth.onAuthStateChanged((user) => {
                if (user) {
                    currentUser = user;
                    document.getElementById('userInfo').innerHTML = `
                        <span style="font-weight:500;">${user.displayName?.split(' ')[0] || 'User'}</span>
                        <button onclick="logout()"><i class="fas fa-sign-out-alt"></i> Logout</button>
                    `;
                } else {
                    currentUser = null;
                    document.getElementById('userInfo').innerHTML = `
                        <button onclick="googleLogin()">
                            <i class="fab fa-google"></i> Login
                        </button>
                    `;
                }
            });
        }

        async function googleLogin() {
            try {
                const provider = new firebase.auth.GoogleAuthProvider();
                await auth.signInWithPopup(provider);
                showToast('Welcome!', 'success');
            } catch (error) {
                showToast('Login failed', 'error');
            }
        }

        async function logout() {
            try {
                await auth.signOut();
                cart = [];
                saveCart();
                displayCart();
                showToast('See you soon!', 'info');
            } catch (error) {
                showToast('Logout failed', 'error');
            }
        }

        // ============================================
        // UI FUNCTIONS
        // ============================================
        function scrollToSection(sectionId) {
            const element = document.getElementById(sectionId);
            if (element) {
                element.scrollIntoView({ behavior: 'smooth' });
            }
        }

        function showToast(message, type = 'success') {
            const toast = document.getElementById('toast');
            const toastMessage = document.getElementById('toastMessage');
            const toastIcon = toast.querySelector('i');
            
            toastMessage.textContent = message;
            
            if (type === 'success') {
                toastIcon.style.color = '#10b981';
            } else if (type === 'error') {
                toastIcon.style.color = '#ef4444';
            } else {
                toastIcon.style.color = '#c49b63';
            }
            
            toast.classList.add('show');
            setTimeout(() => toast.classList.remove('show'), 2000);
        }

        // Make functions global
        window.scrollToSection = scrollToSection;
        window.toggleCart = toggleCart;
        window.addToCart = addToCart;
        window.removeFromCart = removeFromCart;
        window.updateQuantity = updateQuantity;
        window.checkout = checkout;
        window.googleLogin = googleLogin;
        window.logout = logout;
    </script>
</body>
</html>
