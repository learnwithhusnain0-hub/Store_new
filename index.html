<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FoodieExpress | Fast Food Delivery</title>
    
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <!-- Custom CSS -->
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <!-- Navbar -->
    <nav class="navbar">
        <div class="nav-container">
            <div class="logo">
                <i class="fas fa-utensils"></i>
                <h2>Foodie<span>Express</span></h2>
            </div>
            
            <div class="desktop-nav">
                <a href="#home">Home</a>
                <a href="#products">Menu</a>
                <a href="#contact">Contact</a>
            </div>
            
            <div class="right-section">
                <button class="cart-icon" onclick="window.cartUI.toggleCart()">
                    <i class="fas fa-shopping-bag"></i>
                    <span class="cart-count" id="cartCount">0</span>
                </button>
                
                <div class="user-menu">
                    <button class="user-menu-btn" onclick="toggleUserMenu()">
                        <i class="fas fa-user"></i>
                        <span id="userNameDisplay">Account</span>
                        <i class="fas fa-chevron-down"></i>
                    </button>
                    
                    <div class="user-dropdown" id="userDropdown"></div>
                </div>
                
                <button class="menu-toggle" onclick="toggleMobileMenu()">
                    <i class="fas fa-bars"></i>
                </button>
            </div>
        </div>
    </nav>

    <!-- Hero Section -->
    <section class="hero" id="home">
        <div class="hero-content">
            <h1>Delicious <span class="highlight">Food</span> Delivered Fast</h1>
            <p>
                <span><i class="fas fa-check-circle"></i> Fresh ingredients</span>
                <span><i class="fas fa-check-circle"></i> Best prices</span>
                <span><i class="fas fa-check-circle"></i> Quick delivery</span>
            </p>
            <button class="btn-primary" onclick="scrollToMenu()">
                <i class="fas fa-chevron-down"></i> View Menu
            </button>
        </div>
        <div class="hero-image">
            <img src="https://images.unsplash.com/photo-1561758033-d89a9ad46330?w=400" alt="Food">
        </div>
    </section>

    <!-- Products Section -->
    <section class="products" id="products">
        <div class="section-header">
            <h2>Our <span>Menu</span></h2>
            <p>Freshly prepared just for you</p>
        </div>
        
        <div class="products-grid" id="productsGrid">
            <!-- Products will load from Firebase -->
        </div>
    </section>

    <!-- Cart Sidebar -->
    <div class="cart-sidebar" id="cartSidebar">
        <div class="cart-header">
            <h3>Your Cart</h3>
            <button class="close-cart" onclick="window.cartUI.toggleCart()"><i class="fas fa-times"></i></button>
        </div>
        <div class="cart-items" id="cartItems">
            <p style="text-align: center; color: #999;">Cart is empty</p>
        </div>
        <div class="cart-footer">
            <div class="cart-total">
                <span>Total:</span>
                <span id="cartTotal">$0.00</span>
            </div>
            <button class="btn-checkout" onclick="window.cart.checkout()">Checkout</button>
        </div>
    </div>

    <!-- Overlay -->
    <div class="overlay" id="overlay" onclick="window.cartUI.toggleCart()"></div>

    <!-- Toast -->
    <div class="toast" id="toast"><span id="toastMessage"></span></div>

    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-firestore-compat.js"></script>
    
    <!-- JavaScript Modules -->
    <script src="js/firebase-config.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/cart.js"></script>
    <script src="js/store.js"></script>
</body>
                    </html>
